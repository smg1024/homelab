name: Deploy

# Push-based CD. On merge to main, a runner joins the tailnet ephemerally and
# runs `nixos-rebuild switch` against each node. build-host == target-host ==
# the node, so each host builds itself (no arch matrix here, no cache needed) —
# the runner only evaluates the flake and orchestrates. This mirrors the
# Justfile `_rebuild` recipe.
#
# After each switch, `nix store diff-closures` records what changed on the node —
# in the job log and on the run summary page. On failure the step aborts before
# that, and Nix's error output (including the failing build's log tail) is kept.

on:
  push:
    branches: [main]

# Serialize deploys: a new merge waits for an in-flight deploy to finish
# rather than racing it.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  switch:
    name: switch ${{ matrix.host }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [yggdrasil, midgard, alfheim]
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.JAMYE_PLZ_REPO }}

      - name: Join tailnet (ephemeral)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Accept MagicDNS so `*.tail6fc192.ts.net` resolves on the runner.
          args: --accept-dns=true
          # Tailnet peer propagation is eventually consistent, so a cold
          # ssh-keyscan can race the join. `targets` runs `tailscale ping`
          # after `tailscale up` and blocks until the node is reachable.
          targets: ${{ matrix.host }}.tail6fc192.ts.net

      - name: Load deploy key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust ${{ matrix.host }} host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 30 "${{ matrix.host }}.tail6fc192.ts.net" >> ~/.ssh/known_hosts

      - name: nixos-rebuild switch ${{ matrix.host }}
        run: |
          target="poby@${{ matrix.host }}.tail6fc192.ts.net"
          before=$(ssh "$target" readlink -f /run/current-system)

          nix run github:NixOS/nixpkgs/nixos-26.05#nixos-rebuild -- \
            switch \
            --no-reexec \
            --flake ".#${{ matrix.host }}" \
            --build-host "$target" \
            --target-host "$target" \
            --sudo

          after=$(ssh "$target" readlink -f /run/current-system)

          if [ "$before" = "$after" ]; then
            summary="No change — system closure identical."
          else
            # The store paths must expand here, on the runner, so the remote
            # command receives the two concrete generations to compare.
            # shellcheck disable=SC2029
            changes=$(ssh "$target" nix store diff-closures "$before" "$after" \
              || echo "(closure diff unavailable)")

            if [ -n "$changes" ]; then
              summary="$changes"
            else
              # diff-closures only reports version and size changes, so a
              # content-only rebuild (the docs site, say) leaves it silent.
              # Report the generation swap rather than printing nothing.
              summary=$(printf 'Closure changed; no package version changes.\n  %s\n  -> %s' \
                "$before" "$after")
            fi
          fi

          echo "----- what changed on ${{ matrix.host }} -----"
          echo "$summary"

          {
            echo "### ${{ matrix.host }}"
            echo '```'
            echo "$summary"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
