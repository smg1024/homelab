name: Update blog

# Event-driven flake input bump. Every push to smg1024/blog master fires a
# `blog-updated` repository_dispatch at this repo; this workflow re-pins the
# `blog` input, opens a PR, and arms auto-merge so the normal CI -> merge ->
# deploy pipeline ships it. No direct pushes to main: the ruleset (PR + green
# builds) still gates, so a blog change that breaks the yggdrasil build stops
# at CI instead of at activation time.
#
# Uses HOMELAB_PAT (fine-grained PAT) instead of GITHUB_TOKEN: events created
# with the default token never trigger other workflows, so a GITHUB_TOKEN
# push/merge would silently skip both CI and Deploy.

on:
  repository_dispatch:
    types: [blog-updated]
  workflow_dispatch:

# Rapid consecutive blog pushes queue rather than fight over the same branch.
concurrency:
  group: update-blog
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.HOMELAB_PAT }}

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.JAMYE_PLZ_REPO }}

      - name: Update blog input
        run: nix flake update blog

      - name: Open PR and arm auto-merge
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_PAT }}
        run: |
          if git diff --quiet flake.lock; then
            echo "blog input already up to date"
            exit 0
          fi

          rev="$(jq -r '.nodes.blog.locked.rev' flake.lock | cut -c1-12)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C auto/update-blog
          git add flake.lock
          git commit -m "flake: update blog input to ${rev}"
          git push --force origin auto/update-blog

          # Reuse the open PR if a previous bump hasn't merged yet (e.g. CI
          # was red); the force-push above already updated it.
          if [ "$(gh pr list --head auto/update-blog --state open --json number --jq length)" = 0 ]; then
            gh pr create \
              --title "flake: update blog input to ${rev}" \
              --body "Automated bump of the \`blog\` flake input to smg1024/blog@${rev}. Auto-merges once the required build checks pass."
          fi

          # Arming twice errors, so only arm if not already armed.
          if [ "$(gh pr view auto/update-blog --json autoMergeRequest --jq '.autoMergeRequest != null')" != "true" ]; then
            gh pr merge auto/update-blog --auto --squash
          fi
