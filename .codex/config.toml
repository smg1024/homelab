model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
plan_mode_reasoning_effort = "xhigh"

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[features]
multi_agent = true
prevent_idle_sleep = true
hooks = true
goals = true

[analytics]
enabled = false

[feedback]
enabled = false

[agents]
max_threads = 6
max_depth = 1

[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "five-hour-limit",
  "git-branch",
  "branch-changes",
  "project-name",
  "pull-request-number",
]

[sandbox_workspace_write]
network_access = true

[mcp_servers.mcp-nixos]
command = "uvx"
args = ["mcp-nixos"]
