[project]
site_name = "Homelab"
site_description = "NixOS 홈랩 구성 문서"
site_author = "Poby"
copyright = "&copy; 2026 Sangmin Kim"
site_url = "https://docs.ridewithmin.com/ko/"
repo_url = "https://git.ridewithmin.com/smg1024/homelab"
repo_name = "smg1024/homelab"
docs_dir = "ko"
site_dir = "site/ko"

nav = [
  { "개요" = "index.md" },
  { "설계 원칙" = "principles.md" },
  { "아키텍처" = "architecture.md" },
  { "보안 모델" = "security.md" },
  { "호스트" = [{ "yggdrasil" = "hosts/yggdrasil.md" }, { "midgard" = "hosts/midgard.md" }, { "alfheim" = "hosts/alfheim.md" }] },
  { "서비스" = [{ "인그레스" = "services/ingress.md" }, { "모니터링" = "services/monitoring.md" }, { "애플리케이션" = "services/applications.md" }] },
  { "운영" = [{ "배포와 롤백" = "runbooks/deploy.md" }, { "시크릿 관리" = "runbooks/secrets.md" }, { "새 서비스 추가" = "runbooks/add-service.md" }, { "호스트 부트스트랩" = "runbooks/bootstrap-host.md" }, { "백업과 복구" = "runbooks/backup-restore.md" }, { "문서 사이트" = "runbooks/docs-site.md" }] },
  { "결정 기록" = [{ "ADR-001: Zensical" = "decisions/zensical.md" }] },
  { "로드맵" = "roadmap.md" },
]

[project.theme]
language = "ko"
font = false
favicon = "assets/favicon.svg"
icon.logo = "fontawesome/solid/tree"
icon.repo = "simple/forgejo"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "toc.follow",
]

# 자동(시스템 설정) 모드 토글
[[project.theme.palette]]
media = "(prefers-color-scheme)"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "fontawesome/solid/circle-half-stroke"
toggle.name = "라이트 모드로 전환"

# 라이트 모드 토글
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "fontawesome/solid/sun"
toggle.name = "다크 모드로 전환"

# 다크 모드 토글
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "fontawesome/solid/moon"
toggle.name = "시스템 설정으로 전환"

[project.extra]
generator = false
alternate = [
    { name = "English", link = "/", lang = "en" },
    { name = "한국어", link = "/ko/", lang = "ko" },
]

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
