[project]
site_name = "Homelab"
site_description = "NixOS homelab documentation"
site_author = "Poby"
copyright = "&copy; 2026 Sangmin Kim"
site_url = "https://docs.ridewithmin.com/"
repo_url = "https://git.ridewithmin.com/smg1024/homelab"
repo_name = "smg1024/homelab"
docs_dir = "en"
site_dir = "site"

nav = [
  { "Overview" = "index.md" },
  { "Design principles" = "principles.md" },
  { "Architecture" = "architecture.md" },
  { "Security model" = "security.md" },
  { "Hosts" = [{ "yggdrasil" = "hosts/yggdrasil.md" }, { "midgard" = "hosts/midgard.md" }, { "alfheim" = "hosts/alfheim.md" }] },
  { "Services" = [{ "Ingress" = "services/ingress.md" }, { "Monitoring" = "services/monitoring.md" }, { "Applications" = "services/applications.md" }] },
  { "Operations" = [{ "Deploy & rollback" = "runbooks/deploy.md" }, { "CI/CD pipeline" = "runbooks/ci-cd.md" }, { "Secrets" = "runbooks/secrets.md" }, { "Adding a service" = "runbooks/add-service.md" }, { "Bootstrapping a host" = "runbooks/bootstrap-host.md" }, { "Backup & restore" = "runbooks/backup-restore.md" }, { "Docs site" = "runbooks/docs-site.md" }] },
  { "Decisions" = [{ "ADR-001: Zensical" = "decisions/zensical.md" }] },
  { "Roadmap" = "roadmap.md" },
]

extra_javascript = ["assets/javascripts/lang-switch.js"]

[project.theme]
language = "en"
font = false
favicon = "assets/favicon.svg"
icon.logo = "fontawesome/solid/tree"
icon.repo = "simple/forgejo"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "toc.follow",
]

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "fontawesome/solid/circle-half-stroke"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "fontawesome/solid/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "fontawesome/solid/moon"
toggle.name = "Switch to system preference"

[project.extra]
generator = false
alternate = [
    { name = "English", link = "/", lang = "en" },
    { name = "한국어", link = "/ko/", lang = "ko" },
]

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
