site_name: Homelab
site_description: NixOS 홈랩 구성 문서
site_url: https://docs.ridewithmin.com/

theme:
  name: material
  language: ko
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - content.code.copy
    - navigation.footer
    - navigation.sections
    - navigation.top
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - 개요: index.md
  - 아키텍처: architecture.md
  - 호스트:
      - yggdrasil: hosts/yggdrasil.md
      - midgard: hosts/midgard.md
      - alfheim: hosts/alfheim.md
  - 서비스:
      - 인그레스: services/ingress.md
      - 모니터링: services/monitoring.md
      - 애플리케이션: services/applications.md
  - 운영:
      - 배포와 롤백: runbooks/deploy.md
      - 시크릿 관리: runbooks/secrets.md
      - 문서 사이트: runbooks/docs-site.md
