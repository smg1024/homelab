site_name: Homelab
site_description: NixOS homelab documentation
site_url: https://docs.ridewithmin.com/
docs_dir: en

theme:
  name: material
  language: en
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.footer
    - navigation.sections
    - navigation.top
    - search.suggest

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: 한국어
      link: /ko/
      lang: ko

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Hosts:
      - yggdrasil: hosts/yggdrasil.md
      - midgard: hosts/midgard.md
      - alfheim: hosts/alfheim.md
  - Services:
      - Ingress: services/ingress.md
      - Monitoring: services/monitoring.md
      - Applications: services/applications.md
  - Operations:
      - Deploy & rollback: runbooks/deploy.md
      - Secrets: runbooks/secrets.md
      - Docs site: runbooks/docs-site.md
