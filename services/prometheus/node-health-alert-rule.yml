groups:
  - name: node-health
    rules:
      - alert: NodeDown
        expr: up{job="nodes"} == 0
        for: 9m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} is down"
          description: "Prometheus has not been able to scrape {{ $labels.instance }} for 9 minutes."

      - alert: CriticalServiceInactive
        expr: node_systemd_unit_state{name=~"sshd.service|tailscaled.service|caddy.service|cloudflared-tunnel-.*\\.service|uptime-kuma.service|prometheus.service|prometheus-node-exporter.service|forgejo.service|vaultwarden.service|homepage-dashboard.service", state="active"} == 0
        for: 6m
        labels:
          severity: critical
        annotations:
          summary: "Critical service {{ $labels.name }} is inactive on {{ $labels.instance }}"
          description: "The critical systemd service {{ $labels.name }} has not been active for 6 minutes."

      - alert: SystemdServiceFailed
        expr: node_systemd_unit_state{state="failed"} == 1
        for: 6m
        labels:
          severity: warning
        annotations:
          summary: "Systemd service {{ $labels.name }} failed on {{ $labels.instance }}"
          description: "The systemd service {{ $labels.name }} is in failed state."

      - alert: RootDiskLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.15
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Root disk is low on {{ $labels.instance }}"
          description: "Root filesystem free space has been below 15% for 15 minutes."

      - alert: RootInodesLow
        expr: node_filesystem_files_free{mountpoint="/"} / node_filesystem_files{mountpoint="/"} < 0.10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Root filesystem inodes are low on {{ $labels.instance }}"
          description: "Root filesystem free inodes have been below 10% for 15 minutes."

      - alert: RootFilesystemReadOnly
        expr: node_filesystem_readonly{mountpoint="/"} == 1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Root filesystem is read-only on {{ $labels.instance }}"
          description: "The root filesystem has been mounted read-only. This often indicates disk or filesystem trouble."

      - alert: LowMemory
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Low available memory on {{ $labels.instance }}"
          description: "Available memory has been below 10% for 15 minutes."

      - alert: HighCpuUsage
        expr: 1 - avg by (job, instance) (rate(node_cpu_seconds_total{mode="idle"}[15m])) > 0.90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "Average CPU usage has been above 90% for 15 minutes."

      - alert: HighLoad
        expr: node_load15 / count by (job, instance) (node_cpu_seconds_total{mode="idle"}) > 1.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High load on {{ $labels.instance }}"
          description: "15-minute load average has been above 1.5 per CPU core for 15 minutes."
